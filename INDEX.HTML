<!DOCTYPE html>

<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profilo Alessandro Simonazzi</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(180deg,#87CEEB,#FFD580,#90EE90);
display:flex;
flex-direction:column;
align-items:center;
padding:30px 20px;
min-height:100vh;
transition:0.6s;
}

/* SOLE */
body::before{
content:'';
position:fixed;
width:180px;
height:180px;
top:3%;
right:3%;
background:radial-gradient(circle,#FFD700,#FFA500,#FF8C00);
border-radius:50%;
filter:blur(3px);
animation:pulse 6s infinite;
z-index:0;
pointer-events:none;
}

/* DARK MODE */
body.dark-mode{
background:linear-gradient(180deg,#0a0e27,#16213e,#050810);
color:white;
}

/* LUNA */
body.dark-mode::before{
left:5%;
right:auto;
background:radial-gradient(circle,#fff,#ccc,transparent);
}

/* HEADER */
header{
text-align:center;
margin-bottom:30px;
padding:30px;
border-radius:25px;
background:rgba(255,255,255,0.25);
backdrop-filter:blur(15px);
box-shadow:0 10px 40px rgba(0,0,0,0.2);
position:relative;
z-index:2;
animation:fadeDown 1s ease;
}

@keyframes fadeDown{
from{opacity:0;transform:translateY(-40px);}
to{opacity:1;transform:translateY(0);}
}

.profile-img{
width:150px;
height:150px;
border-radius:50%;
border:6px solid white;
box-shadow:0 10px 40px rgba(0,0,0,0.3);
transition:0.4s;
object-fit:cover;
}

.profile-img:hover{
transform:scale(1.12) rotate(6deg);
}

h1{
margin-top:15px;
font-size:38px;
font-weight:900;
letter-spacing:1.5px;
}

/* BOTTONI */
.container{
width:100%;
max-width:420px;
position:relative;
z-index:2;
}

.btn{
display:flex;
justify-content:center;
align-items:center;
padding:18px;
margin-bottom:14px;
border-radius:18px;
background:linear-gradient(135deg,#ACE9FD,#7FD9F5);
color:#333;
text-decoration:none;
font-weight:700;
transition:all 0.35s ease;
box-shadow:0 8px 25px rgba(0,0,0,0.15);
position:relative;
overflow:hidden;
}

.btn::after{
content:'';
position:absolute;
width:0;
height:0;
background:rgba(255,255,255,0.4);
border-radius:50%;
top:50%;
left:50%;
transform:translate(-50%,-50%);
transition:0.5s;
}

.btn:hover::after{
width:260px;
height:260px;
}

.btn:hover{
transform:translateY(-5px);
background:linear-gradient(135deg,#3498db,#2980b9);
color:white;
}

.btn i{margin-right:10px;}

/* DARK BUTTON */
body.dark-mode .btn{
background:linear-gradient(135deg,#3a6ea5,#27496d);
color:white;
}

/* TOGGLE */
#theme-toggle{
margin-bottom:20px;
padding:14px;
width:100%;
max-width:420px;
border:none;
border-radius:16px;
font-weight:800;
cursor:pointer;
background:rgba(255,255,255,0.35);
backdrop-filter:blur(10px);
box-shadow:0 5px 20px rgba(0,0,0,0.15);
position:relative;
z-index:2;
}

/* CONTATTAMI */
.pulsante-animato{
margin-top:20px;
padding:18px;
width:100%;
border-radius:18px;
border:none;
background:linear-gradient(135deg,#667EEA,#764BA2);
color:white;
font-weight:800;
cursor:pointer;
transition:0.35s;
box-shadow:0 12px 35px rgba(0,0,0,0.3);
}

.pulsante-animato:hover{
transform:translateY(-5px) scale(1.04);
}

/* FOOTER */
footer{
margin-top:50px;
opacity:0.85;
position:relative;
z-index:2;
}

/* ENTRATA */
.container{
animation:fadeUp 1s ease;
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(40px);}
to{opacity:1;transform:translateY(0);}
}

/* RESPONSIVE */
@media(max-width:480px){
h1{font-size:30px;}
.profile-img{width:120px;height:120px;}
}
</style>

</head>

<body>

<button id="theme-toggle">🌙 Modalità Notte</button>

<header>
<img src="https://content-s3.tuttocampo.it/Players/Original/8750028.png?v=3" class="profile-img">
<h1>@_ale.simonazzi_</h1>
<p>📚 Studente di Scienze Applicate | ⚽ Appassionato di Calcio</p>
</header>

<main class="container">

<a href="https://www.instagram.com/_ale.simonazzi_/" target="_blank" class="btn">
<i class="fab fa-instagram"></i> Instagram
</a>

<a href="https://torricellimi.edu.it/" target="_blank" class="btn">
<i class="fas fa-school"></i> Istituto
</a>

<a href="https://www.tuttocampo.it/Lombardia/AllieviProvincialiU16/GironeEMilano/Giocatore/Scheda/8750028/Scheda" target="_blank" class="btn">
<i class="fas fa-briefcase"></i> Profilo Professionale
</a>

<a href="https://www.youtube.com/@alessandrosimonazzi2529" target="_blank" class="btn">
<i class="fab fa-youtube"></i> YouTube
</a>

<button id="contact-btn" class="pulsante-animato">💬 Contattami</button>

</main>

<footer>
<p>✨ Creato per il corso di informatica ✨</p>
</footer>

<script>
const pulsante=document.getElementById('theme-toggle');
const corpo=document.body;

// stato salvato
if(localStorage.getItem('darkMode')==='true'){
corpo.classList.add('dark-mode');
pulsante.innerText="☀️ Modalità Giorno";
}

// toggle
pulsante.addEventListener('click',()=>{
corpo.classList.toggle('dark-mode');

if(corpo.classList.contains('dark-mode')){
pulsante.innerText="☀️ Modalità Giorno";
localStorage.setItem('darkMode','true');
}else{
pulsante.innerText="🌙 Modalità Notte";
localStorage.setItem('darkMode','false');
}
});

// contatto
document.getElementById('contact-btn').onclick=()=>{
window.open('https://mail.google.com/mail/?view=cm&fs=1&to=alessandro.simonazzi07@gmail.com');
};
</script>

</body>
</html>
